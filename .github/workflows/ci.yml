name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-unit:
    name: Typecheck + Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Typecheck
        run: npm run lint
      - name: Unit tests
        run: npm test

  integration:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    # GitHub-hosted Ubuntu runners ship Docker, so Testcontainers works out of the box.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Integration tests (real Postgres via Testcontainers)
        run: npm run test:integration

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
